apiVersion: apps/v1
kind: Deployment
metadata:
  name: policygate
  namespace: policygate
  labels:
    app: policygate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: policygate
  template:
    metadata:
      labels:
        app: policygate
    spec:
      serviceAccountName: policygate
      containers:
        - name: webhook
          image: policygate:local
          imagePullPolicy: IfNotPresent
          args:
            - -addr=:8443
            - -metrics-addr=:9090
            - -policy=/policies
            - -tls-cert=/certs/tls.crt
            - -tls-key=/certs/tls.key
          ports:
            - name: webhook
              containerPort: 8443
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: tls
              mountPath: /certs
              readOnly: true
            - name: policies
              mountPath: /policies
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: tls
          secret:
            secretName: policygate-tls
        - name: policies
          configMap:
            name: policygate-policies
