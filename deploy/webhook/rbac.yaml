apiVersion: v1
kind: ServiceAccount
metadata:
  name: policygate
  namespace: policygate
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: policygate
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: policygate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: policygate
subjects:
  - kind: ServiceAccount
    name: policygate
    namespace: policygate
